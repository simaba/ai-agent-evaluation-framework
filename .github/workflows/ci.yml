name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-evaluation-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install validation dependency
        run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema

      - name: Validate sample evaluation report JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from jsonschema import Draft202012Validator

          schema_path = Path('schemas/evaluation-report.schema.json')
          report_path = Path('examples/sample-evaluation-report.json')

          schema = json.loads(schema_path.read_text(encoding='utf-8'))
          report = json.loads(report_path.read_text(encoding='utf-8'))

          validator = Draft202012Validator(schema)
          errors = sorted(validator.iter_errors(report), key=lambda e: list(e.path))

          if errors:
              for error in errors:
                  location = '.'.join(str(part) for part in error.path) or '<root>'
                  print(f'{location}: {error.message}')
              raise SystemExit(1)

          print('Evaluation report JSON is valid.')
          PY
